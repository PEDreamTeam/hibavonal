tags:
  - Users
summary: List all student users (admin only)
security:
  - Bearer: []
responses:
  200:
    description: List of students
    schema:
      type: array
      items:
        type: object
        properties:
          user_id:
            type: integer
          username:
            type: string
          email:
            type: string
          room_id:
            type: integer
            nullable: true
          room_name:
            type: string
            nullable: true
  401:
    description: Missing or invalid token
    schema:
      $ref: '#/definitions/Error'
  403:
    description: Insufficient permissions
    schema:
      $ref: '#/definitions/Error'
