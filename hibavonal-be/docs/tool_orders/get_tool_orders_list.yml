tags:
  - Tool Orders
summary: List tool orders visible to current user (sorted/filtered)
description: >
  Maintainers see only their own orders.
  Maintenance managers and admins see all orders.
security:
  - Bearer: []
parameters:
  - in: query
    name: sort_by
    type: string
    enum: [created_at, name, status]
    default: created_at
  - in: query
    name: sort_order
    type: string
    enum: [asc, desc]
    default: desc
  - in: query
    name: status
    type: string
    enum: [ordered, ready]
responses:
  200:
    description: List of tool orders
    schema:
      type: array
      items:
        $ref: '#/definitions/ToolOrder'
  400:
    description: Invalid query parameter
    schema:
      $ref: '#/definitions/Error'
  401:
    description: Missing or invalid token
    schema:
      $ref: '#/definitions/Error'
  403:
    description: Insufficient permissions
    schema:
      $ref: '#/definitions/Error'
