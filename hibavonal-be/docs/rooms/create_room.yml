tags:
  - Rooms
summary: Create a new room (admin only)
security:
  - Bearer: []
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Room 101
        notes:
          type: string
          nullable: true
          example: Biology lab
responses:
  201:
    description: Room created successfully
    schema:
      $ref: '#/definitions/Room'
  400:
    description: Missing or invalid fields
    schema:
      $ref: '#/definitions/Error'
  401:
    description: Missing or invalid token
    schema:
      $ref: '#/definitions/Error'
  403:
    description: Insufficient permissions
    schema:
      $ref: '#/definitions/Error'
